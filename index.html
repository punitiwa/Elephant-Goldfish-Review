<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DesignDoc Forge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forge: {
              bg: '#0a0a0f',
              card: '#12121a',
              border: 'rgba(255,255,255,0.06)',
              amber: '#f59e0b',
              amberDim: '#92400e',
              red: '#ef4444',
              orange: '#f97316',
              blue: '#3b82f6',
              green: '#22c55e',
              muted: 'rgba(255,255,255,0.35)',
              text: 'rgba(255,255,255,0.85)',
            }
          },
          fontFamily: {
            serif: ['Instrument Serif', 'Georgia', 'serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          },
          animation: {
            'pulse-amber': 'pulseAmber 2s ease-in-out infinite',
            'fade-in': 'fadeIn 0.4s ease forwards',
            'slide-up': 'slideUp 0.35s ease forwards',
            'glow-green': 'glowGreen 1.5s ease-in-out infinite',
          },
          keyframes: {
            pulseAmber: {
              '0%,100%': { boxShadow: '0 0 8px 2px rgba(245,158,11,0.3)' },
              '50%': { boxShadow: '0 0 20px 6px rgba(245,158,11,0.6)' },
            },
            fadeIn: {
              from: { opacity: '0', transform: 'translateY(6px)' },
              to: { opacity: '1', transform: 'translateY(0)' },
            },
            slideUp: {
              from: { opacity: '0', transform: 'translateY(16px)' },
              to: { opacity: '1', transform: 'translateY(0)' },
            },
            glowGreen: {
              '0%,100%': { boxShadow: '0 0 16px 4px rgba(34,197,94,0.3)' },
              '50%': { boxShadow: '0 0 40px 12px rgba(34,197,94,0.6)' },
            },
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }

    body {
      background-color: #0a0a0f;
      color: rgba(255,255,255,0.85);
      font-family: 'JetBrains Mono', monospace;
      margin: 0;
      min-height: 100vh;
    }

    /* Noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    #root { position: relative; z-index: 1; }

    .glass-card {
      background: rgba(18, 18, 26, 0.8);
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .amber-glow { animation: pulseAmber 2s ease-in-out infinite; }
    .green-glow { animation: glowGreen 1.5s ease-in-out infinite; }

    @keyframes pulseAmber {
      0%,100% { box-shadow: 0 0 8px 2px rgba(245,158,11,0.3); }
      50% { box-shadow: 0 0 20px 6px rgba(245,158,11,0.6); }
    }
    @keyframes glowGreen {
      0%,100% { box-shadow: 0 0 16px 4px rgba(34,197,94,0.3); }
      50% { box-shadow: 0 0 40px 12px rgba(34,197,94,0.6); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .fade-in { animation: fadeIn 0.4s ease forwards; }
    .slide-up { animation: slideUp 0.35s ease forwards; }

    .stagger-1 { animation-delay: 50ms; }
    .stagger-2 { animation-delay: 100ms; }
    .stagger-3 { animation-delay: 150ms; }
    .stagger-4 { animation-delay: 200ms; }
    .stagger-5 { animation-delay: 250ms; }

    textarea, input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.85);
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus, input:focus {
      border-color: rgba(245,158,11,0.5);
    }
    textarea::placeholder, input::placeholder {
      color: rgba(255,255,255,0.2);
    }

    .btn-primary {
      background: #f59e0b;
      color: #0a0a0f;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.75rem;
      padding: 0.75rem 2rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:hover:not(:disabled) {
      background: #fbbf24;
      box-shadow: 0 0 20px rgba(245,158,11,0.4);
    }
    .btn-primary:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-ghost {
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      padding: 0.4rem 0.9rem;
      border: 1px solid rgba(255,255,255,0.12);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-ghost:hover:not(:disabled) {
      border-color: rgba(245,158,11,0.4);
      color: rgba(245,158,11,0.8);
    }
    .btn-ghost:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .suggestion-pill {
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.25);
      color: rgba(245,158,11,0.9);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.04em;
      padding: 0.35rem 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .suggestion-pill:hover {
      background: rgba(245,158,11,0.18);
      border-color: rgba(245,158,11,0.5);
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(245,158,11,0.3);
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .doc-viewer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      line-height: 1.7;
      color: rgba(255,255,255,0.75);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .doc-viewer h1, .doc-viewer h2, .doc-viewer h3 {
      font-family: 'Instrument Serif', serif;
      color: rgba(255,255,255,0.9);
    }

    /* Markdown rendered doc */
    .md-doc h1 { font-family: 'Instrument Serif', serif; font-size: 1.4rem; color: rgba(255,255,255,0.95); margin: 1.2rem 0 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 0.4rem; }
    .md-doc h2 { font-family: 'Instrument Serif', serif; font-size: 1.1rem; color: rgba(255,255,255,0.9); margin: 1rem 0 0.4rem; }
    .md-doc h3 { font-family: 'Instrument Serif', serif; font-size: 0.9rem; color: rgba(255,255,255,0.85); margin: 0.8rem 0 0.3rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .md-doc p { margin: 0.4rem 0 0.7rem; font-size: 0.72rem; line-height: 1.75; color: rgba(255,255,255,0.72); }
    .md-doc ul, .md-doc ol { padding-left: 1.2rem; margin: 0.3rem 0 0.6rem; }
    .md-doc li { font-size: 0.72rem; line-height: 1.7; color: rgba(255,255,255,0.7); margin-bottom: 0.2rem; }
    .md-doc code { background: rgba(245,158,11,0.1); color: rgba(245,158,11,0.9); padding: 0.1rem 0.3rem; font-size: 0.68rem; font-family: 'JetBrains Mono', monospace; }
    .md-doc pre { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); padding: 0.8rem; margin: 0.6rem 0; overflow-x: auto; }
    .md-doc pre code { background: none; padding: 0; }
    .md-doc strong { color: rgba(255,255,255,0.9); font-weight: 600; }
    .md-doc blockquote { border-left: 2px solid rgba(245,158,11,0.4); padding-left: 0.8rem; color: rgba(255,255,255,0.5); margin: 0.5rem 0; }
    .md-doc hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 1rem 0; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(245,158,11,0.3); }

    /* Pipeline tracker */
    .pipeline-stage {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      white-space: nowrap;
    }
    .pipeline-stage.active {
      color: #f59e0b;
    }
    .pipeline-stage.done {
      color: rgba(255,255,255,0.5);
    }
    .pipeline-connector {
      width: 20px;
      height: 1px;
      background: rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    .pipeline-connector.done {
      background: rgba(245,158,11,0.4);
    }

    .error-banner {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: rgba(239,68,68,0.9);
      padding: 0.6rem 1rem;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .category-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
    }
    .severity-badge {
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      padding: 0.15rem 0.4rem;
    }

    .issue-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 1rem;
      opacity: 0;
    }
    .issue-card.answered {
      border-color: rgba(34,197,94,0.2);
    }
    .issue-card.critical {
      border-left: 2px solid rgba(239,68,68,0.5);
    }
    .issue-card.assumption {
      border-left: 2px solid rgba(245,158,11,0.5);
    }
    .issue-card.edge {
      border-left: 2px solid rgba(249,115,22,0.5);
    }
    .issue-card.arch {
      border-left: 2px solid rgba(59,130,246,0.5);
    }
    .issue-card.goldfish-fail {
      border-left: 2px solid rgba(239,68,68,0.7);
      border-color: rgba(239,68,68,0.2);
    }

    .elapsed-counter {
      font-size: 0.6rem;
      color: rgba(245,158,11,0.6);
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }

    /* Tooltip for suggestion pills */
    .tooltip-wrap { position: relative; }
    .tooltip-wrap:hover .tooltip-box { display: block; }
    .tooltip-box {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      background: rgba(18,18,26,0.98);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 0.5rem 0.7rem;
      font-size: 0.62rem;
      line-height: 1.5;
      color: rgba(255,255,255,0.75);
      width: 260px;
      z-index: 100;
      pointer-events: none;
    }

    .pass-badge {
      font-family: 'Instrument Serif', serif;
      font-size: 3rem;
      color: #22c55e;
      letter-spacing: 0.1em;
    }

    .copy-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      padding: 0.35rem 0.8rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      border-color: rgba(245,158,11,0.3);
      color: rgba(245,158,11,0.7);
    }
    .copy-btn.copied {
      border-color: rgba(34,197,94,0.4);
      color: rgba(34,197,94,0.7);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <script>
  const { useState, useEffect, useRef, useCallback, useMemo } = React;

  // ─── CONSTANTS ────────────────────────────────────────────────
  const STAGES = {
    INPUT: 'input',
    ELEPHANT_ANALYZING: 'elephant_analyzing',
    USER_QA: 'user_qa',
    REVISING: 'revising',
    GOLDFISH_TESTING: 'goldfish_testing',
    COMPLETE: 'complete',
    MAX_REACHED: 'max_reached',
  };

  const PIPELINE_STEPS = [
    { id: STAGES.INPUT, label: 'Input' },
    { id: STAGES.ELEPHANT_ANALYZING, label: 'Elephant' },
    { id: STAGES.USER_QA, label: 'Q&A' },
    { id: STAGES.REVISING, label: 'Revision' },
    { id: STAGES.GOLDFISH_TESTING, label: 'Goldfish' },
    { id: STAGES.COMPLETE, label: 'Complete' },
  ];

  const STAGE_ORDER = [
    STAGES.INPUT,
    STAGES.ELEPHANT_ANALYZING,
    STAGES.USER_QA,
    STAGES.REVISING,
    STAGES.GOLDFISH_TESTING,
    STAGES.COMPLETE,
  ];

  const CATEGORY_META = {
    CRITICAL_GAP:         { label: '🔴 Critical Gap',         cls: 'critical', color: 'rgba(239,68,68,0.85)',   bg: 'rgba(239,68,68,0.1)',   border: 'rgba(239,68,68,0.25)' },
    WEAK_ASSUMPTION:      { label: '🟡 Weak Assumption',      cls: 'assumption', color: 'rgba(245,158,11,0.85)', bg: 'rgba(245,158,11,0.1)', border: 'rgba(245,158,11,0.25)' },
    MISSING_EDGE_CASE:    { label: '🟠 Edge Case',            cls: 'edge',     color: 'rgba(249,115,22,0.85)',  bg: 'rgba(249,115,22,0.1)',  border: 'rgba(249,115,22,0.25)' },
    ARCHITECTURE_QUESTION:{ label: '🔵 Architecture',         cls: 'arch',     color: 'rgba(59,130,246,0.85)',  bg: 'rgba(59,130,246,0.1)',  border: 'rgba(59,130,246,0.25)' },
  };

  const SEVERITY_META = {
    BLOCKER: { color: 'rgba(239,68,68,0.9)',   bg: 'rgba(239,68,68,0.15)',   label: 'BLOCKER' },
    MAJOR:   { color: 'rgba(249,115,22,0.9)',  bg: 'rgba(249,115,22,0.12)',  label: 'MAJOR' },
    MINOR:   { color: 'rgba(255,255,255,0.4)', bg: 'rgba(255,255,255,0.07)', label: 'MINOR' },
  };

  // ─── OPENAI HELPERS ───────────────────────────────────────────
  async function callOpenAI(apiKey, systemPrompt, userPrompt, maxTokens = 4000) {
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`,
      },
      body: JSON.stringify({
        model: 'gpt-4o',
        max_tokens: maxTokens,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userPrompt },
        ],
      }),
    });
    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${response.status}`);
    }
    const data = await response.json();
    return data.choices[0].message.content;
  }

  function parseJSON(text) {
    const clean = text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  }

  // ─── AI PROMPTS ───────────────────────────────────────────────
  const ELEPHANT_SYSTEM = `You are a principal-level software architect and the world's most rigorous technical design reviewer. You have decades of experience shipping large-scale systems. You are the Elephant — you hold all context, ask the hardest questions, and your singular mission is to make this design document bulletproof before a single line of code is written.

You are brutal, thorough, and precise. Vagueness is a bug. Ambiguity is a bug. Missing edge cases are bugs. Unstated assumptions are bugs. You do not flatter. You do not hedge.

CRITICAL OUTPUT RULE: You must output ONLY valid JSON. No markdown. No preamble. No explanation outside the JSON structure.`;

  const ELEPHANT_USER = (doc) => `Analyze this design document with maximum rigor:

<design_doc>
${doc}
</design_doc>

Return ONLY this JSON structure — no other text:

{
  "summary": "2-3 sentence honest assessment of the doc's current state",
  "issues": [
    {
      "id": "unique_id",
      "category": "CRITICAL_GAP" | "WEAK_ASSUMPTION" | "MISSING_EDGE_CASE" | "ARCHITECTURE_QUESTION",
      "title": "Short title of the issue (max 8 words)",
      "description": "Precise description of the problem. Quote the problematic section if applicable. Explain exactly what's missing and why it would cause implementation failure or ambiguity.",
      "question": "The specific question the implementer needs answered to resolve this issue. Make it concrete and actionable.",
      "severity": "BLOCKER" | "MAJOR" | "MINOR"
    }
  ]
}

Be exhaustive. A doc with 500 words should have at least 8-15 issues. A doc with 2000+ words should have 15-25 issues. Do not hold back. Every vague sentence, every missing error handler, every unstated scale assumption is an issue.`;

  const SUGGEST_SYSTEM = `You are a senior software architect helping a developer make concrete decisions about their system design. You give direct, opinionated, practical answers. You don't ask clarifying questions — you make reasonable assumptions and state them.`;

  const SUGGEST_USER = (issue, docExcerpt) => `A developer is designing a system and encountered this specific issue in their design document:

ISSUE: ${issue.title}
QUESTION: ${issue.question}
CONTEXT FROM DOC: ${docExcerpt}

Generate exactly 3 concrete answer options they could use. Each should be a complete, ready-to-paste answer — not a question or a vague direction. Cover different valid approaches (e.g., simple vs scalable, sync vs async, etc.).

Return ONLY this JSON — no other text:
{
  "suggestions": [
    {
      "label": "Short label (3-5 words)",
      "answer": "Full concrete answer they can use directly. 2-4 sentences. Specific enough to paste into a design doc."
    },
    {
      "label": "Short label (3-5 words)",
      "answer": "Full concrete answer…"
    },
    {
      "label": "Short label (3-5 words)",
      "answer": "Full concrete answer…"
    }
  ]
}`;

  const REVISION_SYSTEM = `You are a principal engineer and technical writer. You rewrite design documents to be precise, complete, and implementation-ready. You incorporate human decisions faithfully and fill remaining gaps with well-reasoned, explicitly-stated defaults. You write for engineers who need zero ambiguity.`;

  const REVISION_USER = (doc, issuesAndAnswers) => `Here is the current design document:

<design_doc>
${doc}
</design_doc>

Here are the issues that were identified and the human's answers to each:

<resolved_issues>
${issuesAndAnswers}
</resolved_issues>

Rewrite the complete design document incorporating every answer above. Rules:

1. Every answered question must be reflected in the revised doc — not as a Q&A appendix, but woven into the appropriate sections
2. State all assumptions explicitly with an "Assumptions" section
3. Add an "Error Handling & Edge Cases" section covering every edge case raised
4. Add an "Open Questions" section for any MINOR issues the user left blank (do NOT add this section if everything was answered)
5. The document must be written so that an engineer with no prior context can implement the system without asking a single clarifying question
6. Use clear markdown formatting with sections, subsections, and bullet points where appropriate

Output ONLY the revised markdown document. No preamble, no explanation, no meta-commentary.`;

  const GOLDFISH_SYSTEM = `You are a brand new engineer who just joined a team. You have been handed a design document. You have zero prior context — no meetings, no Slack, no conversations. You are the Goldfish. You are rigorous, literal, and unforgiving of ambiguity. Your only input is this document.

CRITICAL OUTPUT RULE: Return ONLY valid JSON. No markdown. No preamble.`;

  const GOLDFISH_USER = (doc) => `You have been handed this design document with absolutely no other context:

<design_doc>
${doc}
</design_doc>

Perform a Goldfish Test. Answer everything from the document alone. If you cannot answer something definitively from the document, it is a FAILURE.

Return ONLY this JSON:
{
  "system_comprehension": "3-4 sentence description of what this system does, who uses it, and why it exists — based ONLY on the doc",
  "can_implement": true | false,
  "verdict": "PASS" | "FAIL",
  "pass_reason": "If PASS: one paragraph explaining why this doc is genuinely implementation-ready",
  "failures": [
    {
      "id": "unique_id",
      "category": "CRITICAL_GAP" | "WEAK_ASSUMPTION" | "MISSING_EDGE_CASE" | "ARCHITECTURE_QUESTION",
      "title": "Short title of the gap",
      "description": "Exact description of what's missing or ambiguous",
      "question": "The specific question that must be answered before this doc passes",
      "severity": "BLOCKER" | "MAJOR"
    }
  ]
}

VERDICT RULES:
- PASS: Zero BLOCKER failures. The doc contains everything needed to start implementation.
- FAIL: One or more BLOCKER failures exist. Be ruthless — a doc that would cause an engineer to stop and ask questions is a FAIL.

If verdict is PASS, failures array must be empty.
If verdict is FAIL, failures array must contain ONLY BLOCKER-level issues (omit MAJOR and MINOR).`;

  // ─── MARKDOWN RENDERER ────────────────────────────────────────
  function renderMarkdown(text) {
    if (!text) return '';
    let html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    // Code blocks
    html = html.replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // HR
    html = html.replace(/^---+$/gm, '<hr/>');
    // H1-H3
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // Blockquote
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
    // Bold
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // Italic
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    // Unordered list items
    html = html.replace(/^\s*[-*] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, (m) => `<ul>${m}</ul>`);
    // Ordered list
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    // Paragraphs
    const lines = html.split('\n');
    const result = [];
    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed) { result.push(''); continue; }
      if (trimmed.startsWith('<h') || trimmed.startsWith('<ul') ||
          trimmed.startsWith('<li') || trimmed.startsWith('<pre') ||
          trimmed.startsWith('<hr') || trimmed.startsWith('<blockquote')) {
        result.push(trimmed);
      } else {
        result.push(`<p>${trimmed}</p>`);
      }
    }
    return result.join('\n');
  }

              disabled: !canRun,
              style: { letterSpacing: '0.12em' },
            }, 'Run Through The Forge')
          )
        ),

        // Error
        state.error && React.createElement(ErrorBanner, {
          error: state.error,
          onDismiss: () => setState(s => ({ ...s, error: null })),
        }),

        // Footer note
        React.createElement('p', {
          style: { fontSize: '0.58rem', color: 'rgba(255,255,255,0.15)', textAlign: 'center' }
        }, 'API key is stored in memory only — never persisted or logged.')
      );
    }

    function renderCompleteScreen(state, onReset, onCopy) {
      const isPass = state.stage === STAGES.COMPLETE;
      return React.createElement('main', {
        style: {
          flex: 1,
          display: 'grid',
          gridTemplateColumns: '1fr 380px',
          gap: 0,
          overflow: 'hidden',
        }
      },
        // Left — final doc
        React.createElement('div', {
          ref: leftPanelRef,
          style: {
            borderRight: '1px solid rgba(255,255,255,0.06)',
            padding: '1.5rem',
            overflowY: 'auto',
          }
        },
          React.createElement('div', {
            style: {
              fontSize: '0.55rem', letterSpacing: '0.1em', textTransform: 'uppercase',
              color: 'rgba(255,255,255,0.25)', marginBottom: '1rem',
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            }
          },
            React.createElement('span', null,
              React.createElement('span', { style: { color: isPass ? 'rgba(34,197,94,0.6)' : 'rgba(245,158,11,0.6)', marginRight: '0.4rem' } }, isPass ? '■' : '▲'),
              isPass ? 'Final Document — Production Ready' : 'Best Document — Max Iterations Reached'
            ),
            React.createElement('div', { style: { display: 'flex', gap: '0.5rem' } },
              React.createElement('button', {
                className: `copy-btn ${state.copyStatus === 'copied' ? 'copied' : ''}`,
                onClick: onCopy,
              }, state.copyStatus === 'copied' ? '✓ Copied' : 'Copy Markdown'),
            )
          ),
          React.createElement('div', {
            className: 'md-doc',
            dangerouslySetInnerHTML: { __html: renderMarkdown(state.finalDoc) }
          })
        ),

        // Right — result summary
        React.createElement('div', {
          style: {
            padding: '1.5rem',
            overflowY: 'auto',
            display: 'flex',
            flexDirection: 'column',
            gap: '1.5rem',
          }
        },
          // Pass/fail badge
          React.createElement('div', {
            className: `glass-card ${isPass ? 'green-glow' : ''}`,
            style: {
              padding: '1.5rem',
              textAlign: 'center',
              border: isPass ? '1px solid rgba(34,197,94,0.2)' : '1px solid rgba(245,158,11,0.2)',
            }
          },
            React.createElement('div', {
              style: {
                fontFamily: 'Instrument Serif, serif',
                fontSize: '2.5rem',
                color: isPass ? '#22c55e' : '#f59e0b',
                marginBottom: '0.5rem',
                letterSpacing: '0.1em',
              }
            }, isPass ? '✓ PASS' : '⚠ MAX'),
            React.createElement('div', {
              style: { fontSize: '0.65rem', color: 'rgba(255,255,255,0.5)', lineHeight: 1.6 }
            },
              isPass
                ? `Document passed in ${state.iteration} iteration${state.iteration !== 1 ? 's' : ''}.`
                : `Reached ${state.maxIterations} iterations without a full pass.`
            ),
            isPass && state.goldfishResult?.pass_reason &&
              React.createElement('p', {
                style: { fontSize: '0.63rem', color: 'rgba(255,255,255,0.4)', marginTop: '0.7rem', lineHeight: 1.6, textAlign: 'left' }
              }, state.goldfishResult.pass_reason),
          ),

          // Goldfish comprehension
          state.goldfishResult?.system_comprehension &&
            React.createElement('div', { className: 'glass-card', style: { padding: '1rem' } },
              React.createElement('div', {
                style: { fontSize: '0.55rem', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.25)', marginBottom: '0.5rem' }
              }, '🐟 Goldfish Comprehension'),
              React.createElement('p', {
                style: { fontSize: '0.68rem', color: 'rgba(255,255,255,0.55)', lineHeight: 1.65, margin: 0 }
              }, state.goldfishResult.system_comprehension)
            ),

          // Activity feed
          React.createElement('div', { className: 'glass-card', style: { padding: '1rem' } },
            React.createElement('div', {
              style: { fontSize: '0.55rem', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.25)', marginBottom: '0.6rem' }
            }, 'Pipeline Log'),
            ...state.activityFeed.map(e => React.createElement(ActivityEntry, { key: e.id, entry: e }))
          ),

          // Reset
          React.createElement('button', {
            className: 'btn-ghost',
            onClick: onReset,
            style: { alignSelf: 'flex-start' }
          }, '← Forge Another Doc')
        )
      );
    }

    function renderWorkScreen(state, setState, onAnswer, onSuggest, onRevise, blockerUnanswered, answeredCount, rightRef, leftRef) {
      const isQA = state.stage === STAGES.USER_QA;
      const isGoldfishFail = state.iteration > 1 && isQA;

      return React.createElement('main', {
        style: {
          flex: 1,
          display: 'grid',
          gridTemplateColumns: '1fr 420px',
          gap: 0,
          overflow: 'hidden',
        }
      },
        // ── LEFT PANEL — Doc viewer ──
        React.createElement('div', {
          ref: leftRef,
          style: {
            borderRight: '1px solid rgba(255,255,255,0.06)',
            padding: '1.5rem',
            overflowY: 'auto',
            display: 'flex',
            flexDirection: 'column',
          }
        },
          React.createElement('div', {
            style: {
              fontSize: '0.55rem', letterSpacing: '0.1em', textTransform: 'uppercase',
              color: 'rgba(255,255,255,0.2)', marginBottom: '1rem',
            }
          }, '■ Live Document'),

          state.currentDoc
            ? React.createElement('div', {
                className: 'md-doc',
                dangerouslySetInnerHTML: { __html: renderMarkdown(state.currentDoc) }
              })
            : React.createElement('div', {
                style: { color: 'rgba(255,255,255,0.1)', fontSize: '0.7rem' }
              }, 'Document will appear here after first revision.')
        ),

        // ── RIGHT PANEL — Q&A / Status ──
        React.createElement('div', {
          ref: rightRef,
          style: {
            padding: '1.2rem',
            overflowY: 'auto',
            display: 'flex',
            flexDirection: 'column',
            gap: '0.8rem',
          }
        },
          // Error
          state.error && React.createElement(ErrorBanner, {
            error: state.error,
            onDismiss: () => setState(s => ({ ...s, error: null })),
          }),

          // Loading state
          isRunning && React.createElement('div', {
            className: 'glass-card fade-in',
            style: { padding: '1rem', display: 'flex', flexDirection: 'column', gap: '0.5rem' }
          },
            React.createElement('div', {
              style: { display: 'flex', alignItems: 'center', gap: '0.6rem' }
            },
              React.createElement('span', { className: 'spinner' }),
              React.createElement('span', {
                style: { fontSize: '0.68rem', color: 'rgba(255,255,255,0.6)' }
              },
                state.stage === STAGES.ELEPHANT_ANALYZING ? '🐘 Elephant analyzing...' :
                state.stage === STAGES.REVISING ? '✏️ Revising document...' :
                '🐟 Goldfish testing...'
              ),
              React.createElement(ElapsedTimer, { running: isRunning }),
            )
          ),

          // Elephant summary
          state.elephantSummary && React.createElement('div', {
            className: 'glass-card fade-in',
            style: { padding: '0.85rem', borderLeft: '2px solid rgba(245,158,11,0.4)' }
          },
            React.createElement('div', {
              style: { fontSize: '0.55rem', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(245,158,11,0.5)', marginBottom: '0.35rem' }
            }, isGoldfishFail ? '🐟 Goldfish Verdict' : '🐘 Elephant Assessment'),
            React.createElement('p', {
              style: { fontSize: '0.68rem', color: 'rgba(255,255,255,0.55)', lineHeight: 1.6, margin: 0 }
            }, state.elephantSummary)
          ),

          // Q&A Phase
          isQA && state.issues.length > 0 && React.createElement(React.Fragment, null,
            React.createElement('div', {
              style: {
                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                fontSize: '0.6rem', color: 'rgba(255,255,255,0.3)', letterSpacing: '0.06em',
              }
            },
              React.createElement('span', null,
                `${state.issues.length} issue${state.issues.length !== 1 ? 's' : ''} · ${answeredCount} answered`
              ),
              blockerUnanswered > 0 && React.createElement('span', {
                style: { color: 'rgba(239,68,68,0.7)' }
              }, `${blockerUnanswered} blocker${blockerUnanswered !== 1 ? 's' : ''} unanswered`)
            ),

            ...state.issues.map((issue, idx) =>
              React.createElement(IssueCard, {
                key: issue.id,
                issue,
                index: idx,
                onAnswer,
                onSuggest,
                isGoldfishFail,
              })
            ),

            // Revise CTA
            React.createElement('div', {
              style: {
                position: 'sticky', bottom: 0,
                background: 'linear-gradient(to top, rgba(10,10,15,1) 60%, transparent)',
                paddingTop: '1.5rem',
                marginTop: '0.5rem',
              }
            },
              React.createElement('button', {
                className: 'btn-primary',
                onClick: onRevise,
                disabled: blockerUnanswered > 0,
                style: { width: '100%', textAlign: 'center' },
              },
                blockerUnanswered > 0
                  ? `Answer ${blockerUnanswered} blocker${blockerUnanswered !== 1 ? 's' : ''} to continue`
                  : `Revise with ${answeredCount} answer${answeredCount !== 1 ? 's' : ''}`
              ),
              blockerUnanswered === 0 && answeredCount < state.issues.length &&
                React.createElement('p', {
                  style: { fontSize: '0.58rem', color: 'rgba(255,255,255,0.2)', textAlign: 'center', marginTop: '0.4rem' }
                }, `${state.issues.length - answeredCount} non-blocker${state.issues.length - answeredCount !== 1 ? 's' : ''} left blank — Elephant will mark them as Open Questions`)
            )
          ),

          // Activity feed (non-QA or alongside)
          !isQA && state.activityFeed.length > 0 && React.createElement('div', {
            style: { display: 'flex', flexDirection: 'column', gap: 0 }
          },
            React.createElement('div', {
              style: { fontSize: '0.55rem', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.2)', marginBottom: '0.4rem' }
            }, 'Activity'),
            ...state.activityFeed.map(e => React.createElement(ActivityEntry, { key: e.id, entry: e }))
          )
        )
      );
    }
  }

  // ─── MOUNT ────────────────────────────────────────────────────
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
  </script>
</body>
</html>
