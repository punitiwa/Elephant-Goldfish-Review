<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DesignDoc Forge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens ─────────────────────────────────── */
    :root {
      --bg:            #07070a;
      --surface:       rgba(255,255,255,0.028);
      --surface-2:     rgba(255,255,255,0.05);
      --border:        rgba(255,255,255,0.07);
      --border-focus:  rgba(245,158,11,0.45);
      --amber:         #f59e0b;
      --amber-dim:     rgba(245,158,11,0.11);
      --amber-border:  rgba(245,158,11,0.3);
      --red:           #f87171;
      --red-dim:       rgba(248,113,113,0.1);
      --green:         #4ade80;
      --green-dim:     rgba(74,222,128,0.1);
      --blue:          #60a5fa;
      --blue-dim:      rgba(96,165,250,0.1);
      --orange:        #fb923c;
      --orange-dim:    rgba(251,146,60,0.1);
      --text:          rgba(255,255,255,0.9);
      --text-2:        rgba(255,255,255,0.5);
      --text-3:        rgba(255,255,255,0.22);
      --mono:          'JetBrains Mono', 'Fira Code', monospace;
      --serif:         'Instrument Serif', Georgia, serif;
      --sans:          -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 40% at 50% -10%, rgba(245,158,11,0.055) 0%, transparent 100%),
        radial-gradient(rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 100% 100%, 26px 26px;
      background-attachment: fixed, fixed;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Scrollbar ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(245,158,11,0.25); }

    /* ── Animations ─────────────────────────────────────── */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes spin     { to { transform:rotate(360deg); } }
    @keyframes dotPulse { 0%,100% { box-shadow:0 0 0 0 rgba(245,158,11,0.5); } 50% { box-shadow:0 0 0 4px rgba(245,158,11,0); } }
    @keyframes diamondSpin { to { transform:rotate(360deg); } }
    @keyframes greenPulse { 0%,100% { box-shadow:0 0 12px 2px rgba(74,222,128,0.2); } 50% { box-shadow:0 0 28px 8px rgba(74,222,128,0.4); } }

    .fade-up { animation: fadeUp 0.35s ease forwards; }
    .fade-in { animation: fadeIn 0.3s ease forwards; }

    /* ── HEADER ─────────────────────────────────────────── */
    .header {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,7,10,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-shrink: 0;
      position: relative;
      z-index: 20;
      gap: 16px;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .logo-diamond {
      width: 18px;
      height: 18px;
      background: var(--amber);
      transform: rotate(45deg);
      flex-shrink: 0;
      animation: diamondSpin 12s linear infinite;
    }

    .logo-name {
      font-family: var(--serif);
      font-size: 16px;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .logo-tag {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      padding: 2px 7px;
      border: 1px solid var(--border);
    }

    .header-center { display: flex; align-items: center; gap: 0; flex: 1; justify-content: center; overflow: hidden; }

    .header-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }

    /* Pipeline tracker */
    .pipeline-step {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-3);
      white-space: nowrap;
    }
    .pipeline-step.active { color: var(--amber); }
    .pipeline-step.done   { color: rgba(255,255,255,0.38); }

    .pipeline-node {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      border: 1px solid currentColor;
      flex-shrink: 0;
      transition: all 0.3s;
    }
    .pipeline-step.done  .pipeline-node { background: rgba(255,255,255,0.38); border-color: rgba(255,255,255,0.38); }
    .pipeline-step.active .pipeline-node {
      background: var(--amber);
      border-color: var(--amber);
      animation: dotPulse 1.8s ease-in-out infinite;
    }

    .pipeline-line {
      width: 18px;
      height: 1px;
      background: var(--border);
      flex-shrink: 0;
    }
    .pipeline-line.done { background: rgba(245,158,11,0.3); }

    .iter-badge {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-3);
      letter-spacing: 0.06em;
    }

    .elapsed-timer {
      font-family: var(--mono);
      font-size: 9px;
      color: rgba(245,158,11,0.65);
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
      min-width: 34px;
    }

    /* ── BUTTONS ─────────────────────────────────────────── */
    .btn-primary {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #08080c;
      background: var(--amber);
      border: none;
      padding: 10px 24px;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary:hover:not(:disabled) {
      background: #fbbf24;
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(245,158,11,0.28);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.28; cursor: not-allowed; }

    .btn-ghost {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-2);
      background: transparent;
      border: 1px solid var(--border);
      padding: 7px 14px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover:not(:disabled) { border-color: rgba(255,255,255,0.18); color: var(--text); }
    .btn-ghost:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-suggest {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      color: var(--text-3);
      background: transparent;
      border: 1px solid var(--border);
      padding: 5px 11px;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn-suggest:hover:not(:disabled) { border-color: var(--amber-border); color: var(--amber); }
    .btn-suggest:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── INPUTS ──────────────────────────────────────────── */
    textarea, input[type="text"], input[type="password"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus, input:focus { border-color: var(--border-focus); }
    textarea::placeholder, input::placeholder { color: var(--text-3); }

    /* ── INPUT SCREEN ────────────────────────────────────── */
    .screen-input {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      gap: 40px;
      overflow-y: auto;
    }

    .hero { text-align: center; max-width: 520px; }

    .hero h2 {
      font-family: var(--serif);
      font-size: clamp(28px, 4.5vw, 46px);
      line-height: 1.12;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 14px;
    }

    .hero p {
      font-size: 13.5px;
      color: var(--text-2);
      line-height: 1.7;
    }

    .hero-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(245,158,11,0.7);
      background: var(--amber-dim);
      border: 1px solid var(--amber-border);
      padding: 4px 10px;
      margin-bottom: 20px;
    }

    .input-box {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .input-box textarea {
      width: 100%;
      min-height: 240px;
      padding: 16px 18px;
      font-family: var(--mono);
      font-size: 11.5px;
      line-height: 1.75;
      resize: vertical;
    }

    .input-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
    }

    .char-count {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-3);
      letter-spacing: 0.05em;
    }

    /* ── WORK SCREEN ─────────────────────────────────────── */
    .screen-work {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 400px;
      overflow: hidden;
    }

    .panel-left {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .panel-right {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 20px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .panel-label-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--amber);
      opacity: 0.6;
    }

    .panel-doc { padding: 20px 24px; flex: 1; }

    /* ── MARKDOWN ────────────────────────────────────────── */
    .md-doc { font-size: 12.5px; line-height: 1.8; color: var(--text-2); }
    .md-doc h1 {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--text);
      margin: 20px 0 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .md-doc h2 {
      font-family: var(--serif);
      font-size: 17px;
      color: var(--text);
      margin: 18px 0 6px;
    }
    .md-doc h3 {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      margin: 14px 0 5px;
    }
    .md-doc p { margin-bottom: 10px; }
    .md-doc ul, .md-doc ol { padding-left: 18px; margin-bottom: 10px; }
    .md-doc li { margin-bottom: 3px; }
    .md-doc strong { color: var(--text); font-weight: 600; }
    .md-doc code {
      font-family: var(--mono);
      font-size: 11px;
      background: rgba(245,158,11,0.08);
      color: rgba(245,158,11,0.85);
      padding: 1px 5px;
    }
    .md-doc pre {
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      padding: 12px 14px;
      margin: 10px 0;
      overflow-x: auto;
    }
    .md-doc pre code { background: none; padding: 0; color: var(--text-2); }
    .md-doc blockquote {
      border-left: 2px solid var(--amber-border);
      padding-left: 12px;
      color: var(--text-3);
      margin: 8px 0;
    }
    .md-doc hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* ── SUMMARY CARD ───────────────────────────────────── */
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--amber-border);
      padding: 13px 15px;
      animation: fadeUp 0.3s ease forwards;
    }
    .summary-label {
      font-family: var(--mono);
      font-size: 8.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(245,158,11,0.6);
      margin-bottom: 6px;
    }
    .summary-text { font-size: 12px; color: var(--text-2); line-height: 1.65; }

    /* ── ISSUE META ROW ─────────────────────────────────── */
    .issues-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-3);
      letter-spacing: 0.05em;
    }
    .blocker-warn { color: rgba(248,113,113,0.75); }

    /* ── ISSUE CARD ─────────────────────────────────────── */
    .issue-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 14px 15px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      opacity: 0;
      animation: fadeUp 0.35s ease forwards;
    }

    .issue-card.answered { border-color: rgba(74,222,128,0.14); }
    .issue-card.cat-critical  { border-left: 2px solid rgba(248,113,113,0.45); }
    .issue-card.cat-assumption{ border-left: 2px solid rgba(245,158,11,0.45); }
    .issue-card.cat-edge      { border-left: 2px solid rgba(251,146,60,0.45); }
    .issue-card.cat-arch      { border-left: 2px solid rgba(96,165,250,0.45); }

    .issue-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .issue-badges { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

    .badge {
      font-family: var(--mono);
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 6px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .b-critical   { color: var(--red);    background: var(--red-dim); }
    .b-assumption { color: var(--amber);  background: var(--amber-dim); }
    .b-edge       { color: var(--orange); background: var(--orange-dim); }
    .b-arch       { color: var(--blue);   background: var(--blue-dim); }
    .b-blocker    { color: var(--red);    background: var(--red-dim); }
    .b-major      { color: var(--orange); background: var(--orange-dim); }
    .b-minor      { color: var(--text-3); background: rgba(255,255,255,0.05); }
    .b-answered   { color: var(--green);  background: var(--green-dim); }

    .issue-num { font-family: var(--mono); font-size: 9px; color: var(--text-3); flex-shrink: 0; }

    .issue-title {
      font-family: var(--serif);
      font-size: 15px;
      color: var(--text);
      line-height: 1.3;
    }
    .issue-desc { font-size: 12px; color: var(--text-3); line-height: 1.65; }
    .issue-q {
      background: rgba(245,158,11,0.04);
      border-left: 2px solid rgba(245,158,11,0.22);
      padding: 8px 10px;
      font-size: 11.5px;
      color: rgba(245,158,11,0.72);
      line-height: 1.55;
    }

    .issue-textarea {
      width: 100%;
      min-height: 64px;
      padding: 8px 10px;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.65;
      resize: vertical;
    }

    /* ── SUGGESTIONS ────────────────────────────────────── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      animation: fadeUp 0.25s ease forwards;
    }

    .suggestion-pill {
      position: relative;
      font-family: var(--mono);
      font-size: 9.5px;
      letter-spacing: 0.04em;
      color: rgba(245,158,11,0.82);
      background: var(--amber-dim);
      border: 1px solid rgba(245,158,11,0.2);
      padding: 5px 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .suggestion-pill:hover { background: rgba(245,158,11,0.18); border-color: rgba(245,158,11,0.38); }

    .pill-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      min-width: 220px;
      max-width: 280px;
      background: #13131a;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 9px 11px;
      font-family: var(--mono);
      font-size: 10px;
      line-height: 1.55;
      color: var(--text-2);
      z-index: 50;
      pointer-events: none;
      white-space: normal;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .suggestion-pill:hover .pill-tooltip { display: block; }

    /* ── LOADING ────────────────────────────────────────── */
    .loading-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--amber-border);
      padding: 13px 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.2s ease forwards;
    }
    .spinner {
      width: 14px;
      height: 14px;
      border: 1.5px solid rgba(245,158,11,0.2);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .loading-text { font-size: 12px; color: var(--text-2); }

    /* ── REVISE BAR ─────────────────────────────────────── */
    .revise-bar {
      position: sticky;
      bottom: 0;
      padding-top: 20px;
      background: linear-gradient(to top, rgba(7,7,10,1) 55%, transparent);
      margin-top: 6px;
    }
    .revise-btn {
      width: 100%;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #08080c;
      background: var(--amber);
      border: none;
      padding: 12px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .revise-btn:hover:not(:disabled) {
      background: #fbbf24;
      box-shadow: 0 4px 20px rgba(245,158,11,0.28);
    }
    .revise-btn:disabled { opacity: 0.28; cursor: not-allowed; }

    .revise-hint {
      text-align: center;
      margin-top: 7px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-3);
      letter-spacing: 0.04em;
    }

    /* ── ACTIVITY ───────────────────────────────────────── */
    .activity-entry {
      display: flex;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 11.5px;
      color: var(--text-3);
      line-height: 1.55;
      animation: fadeUp 0.2s ease forwards;
    }
    .activity-icon { flex-shrink: 0; font-size: 11px; }

    /* ── ERROR BANNER ───────────────────────────────────── */
    .error-banner {
      background: var(--red-dim);
      border: 1px solid rgba(248,113,113,0.22);
      padding: 10px 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      color: rgba(248,113,113,0.85);
      animation: fadeUp 0.2s ease forwards;
    }
    .error-dismiss {
      background: none;
      border: none;
      color: rgba(248,113,113,0.5);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }

    /* ── COMPLETE SCREEN ────────────────────────────────── */
    .screen-complete {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 380px;
      overflow: hidden;
    }

    .result-sidebar {
      border-left: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px;
    }

    .pass-card {
      border: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      animation: fadeUp 0.4s ease forwards;
    }
    .pass-card.pass-state {
      border-color: rgba(74,222,128,0.2);
      background: rgba(74,222,128,0.04);
      animation: greenPulse 2.5s ease-in-out infinite, fadeUp 0.4s ease forwards;
    }
    .pass-card.warn-state {
      border-color: var(--amber-border);
      background: var(--amber-dim);
    }

    .pass-title {
      font-family: var(--serif);
      font-size: 42px;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .pass-title.pass-state { color: var(--green); }
    .pass-title.warn-state { color: var(--amber); }

    .pass-sub { font-size: 12.5px; color: var(--text-2); line-height: 1.6; }
    .pass-reason { font-size: 11.5px; color: var(--text-3); line-height: 1.65; margin-top: 12px; text-align: left; }

    .copy-btn {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-2);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .copy-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
    .copy-btn.copied { border-color: rgba(74,222,128,0.3); color: var(--green); }

    .comprehension-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 14px 15px;
      opacity: 0;
      animation: fadeUp 0.35s ease 0.1s forwards;
    }
    .section-label {
      font-family: var(--mono);
      font-size: 8.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 7px;
    }

    .empty-doc {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text-3);
    }

    /* ── MAX REACHED ────────────────────────────────────── */
    .max-banner {
      background: var(--amber-dim);
      border: 1px solid var(--amber-border);
      padding: 10px 14px;
      font-size: 11.5px;
      color: rgba(245,158,11,0.75);
      line-height: 1.55;
    }

    /* ── MOBILE ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      #root { overflow: auto; }

      .header { padding: 0 14px; gap: 10px; }
      .header-center { display: none; }
      .logo-tag { display: none; }
      .logo-name { font-size: 15px; }

      .screen-input { padding: 32px 16px; gap: 28px; }
      .hero h2 { font-size: 26px; }

      .screen-work {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        overflow: auto;
        height: auto;
        min-height: 0;
      }

      .panel-left {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 45vh;
        overflow-y: auto;
      }

      .panel-right { padding: 16px; }

      .screen-complete {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        overflow: auto;
        height: auto;
      }

      .result-sidebar {
        border-left: none;
        border-top: 1px solid var(--border);
      }

      .revise-bar { position: relative; padding-top: 12px; background: none; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script>
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── Constants ────────────────────────────────────────────
const S = {
  INPUT:      'input',
  ELEPHANT:   'elephant_analyzing',
  QA:         'user_qa',
  REVISING:   'revising',
  GOLDFISH:   'goldfish_testing',
  COMPLETE:   'complete',
  MAX:        'max_reached',
};

const PIPELINE = [
  { id: S.INPUT,    label: 'Input' },
  { id: S.ELEPHANT, label: 'Elephant' },
  { id: S.QA,       label: 'Q&A' },
  { id: S.REVISING, label: 'Revision' },
  { id: S.GOLDFISH, label: 'Goldfish' },
  { id: S.COMPLETE, label: 'Complete' },
];

const ORDER = [S.INPUT, S.ELEPHANT, S.QA, S.REVISING, S.GOLDFISH, S.COMPLETE];

const CAT = {
  CRITICAL_GAP:          { cls: 'cat-critical',   bCls: 'b-critical',   label: '🔴 Critical',     },
  WEAK_ASSUMPTION:       { cls: 'cat-assumption',  bCls: 'b-assumption', label: '🟡 Assumption',   },
  MISSING_EDGE_CASE:     { cls: 'cat-edge',        bCls: 'b-edge',       label: '🟠 Edge Case',    },
  ARCHITECTURE_QUESTION: { cls: 'cat-arch',        bCls: 'b-arch',       label: '🔵 Architecture', },
};

const SEV = {
  BLOCKER: { cls: 'b-blocker', label: 'BLOCKER' },
  MAJOR:   { cls: 'b-major',   label: 'MAJOR'   },
  MINOR:   { cls: 'b-minor',   label: 'MINOR'   },
};

// ── OpenAI ───────────────────────────────────────────────
async function callAI(system, user, maxTokens = 4000) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'gpt-4o',
      max_tokens: maxTokens,
      messages: [{ role: 'system', content: system }, { role: 'user', content: user }],
    }),
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error?.message || `API error ${res.status}`);
  }
  const d = await res.json();
  return d.choices[0].message.content;
}

function parseJSON(t) {
  return JSON.parse(t.replace(/```json|```/g, '').trim());
}

// ── Prompts ──────────────────────────────────────────────
const P = {
  elephantSystem: `You are a principal-level software architect and the world's most rigorous technical design reviewer. You have decades of experience shipping large-scale systems. You are the Elephant — you hold all context, ask the hardest questions, and your singular mission is to make this design document bulletproof before a single line of code is written.

You are brutal, thorough, and precise. Vagueness is a bug. Ambiguity is a bug. Missing edge cases are bugs. Unstated assumptions are bugs. You do not flatter. You do not hedge.

CRITICAL OUTPUT RULE: You must output ONLY valid JSON. No markdown. No preamble. No explanation outside the JSON structure.`,

  elephantUser: doc => `Analyze this design document with maximum rigor:

<design_doc>
${doc}
</design_doc>

Return ONLY this JSON structure — no other text:

{
  "summary": "2-3 sentence honest assessment of the doc's current state",
  "issues": [
    {
      "id": "unique_id",
      "category": "CRITICAL_GAP" | "WEAK_ASSUMPTION" | "MISSING_EDGE_CASE" | "ARCHITECTURE_QUESTION",
      "title": "Short title of the issue (max 8 words)",
      "description": "Precise description of the problem. Quote the problematic section if applicable. Explain exactly what's missing and why it would cause implementation failure or ambiguity.",
      "question": "The specific question the implementer needs answered to resolve this issue. Make it concrete and actionable.",
      "severity": "BLOCKER" | "MAJOR" | "MINOR"
    }
  ]
}

Be exhaustive. A doc with 500 words should have at least 8-15 issues. A doc with 2000+ words should have 15-25 issues.`,

  suggestSystem: `You are a senior software architect helping a developer make concrete decisions about their system design. You give direct, opinionated, practical answers. You don't ask clarifying questions — you make reasonable assumptions and state them.`,

  suggestUser: (issue, excerpt) => `A developer is designing a system and encountered this specific issue in their design document:

ISSUE: ${issue.title}
QUESTION: ${issue.question}
CONTEXT FROM DOC: ${excerpt}

Generate exactly 3 concrete answer options they could use. Each should be a complete, ready-to-paste answer — not a question or a vague direction. Cover different valid approaches.

Return ONLY this JSON — no other text:
{
  "suggestions": [
    { "label": "Short label (3-5 words)", "answer": "Full concrete answer. 2-4 sentences." },
    { "label": "Short label (3-5 words)", "answer": "Full concrete answer." },
    { "label": "Short label (3-5 words)", "answer": "Full concrete answer." }
  ]
}`,

  revisionSystem: `You are a principal engineer and technical writer. You rewrite design documents to be precise, complete, and implementation-ready. You incorporate human decisions faithfully and fill remaining gaps with well-reasoned, explicitly-stated defaults. You write for engineers who need zero ambiguity.`,

  revisionUser: (doc, ia) => `Here is the current design document:

<design_doc>
${doc}
</design_doc>

Here are the issues that were identified and the human's answers to each:

<resolved_issues>
${ia}
</resolved_issues>

Rewrite the complete design document incorporating every answer above. Rules:
1. Every answered question must be woven into the appropriate sections — not a Q&A appendix
2. State all assumptions explicitly with an "Assumptions" section
3. Add an "Error Handling & Edge Cases" section covering every edge case raised
4. Add an "Open Questions" section for any MINOR issues left blank (omit if everything was answered)
5. The document must be written so that an engineer with no prior context can implement the system without asking a single clarifying question
6. Use clear markdown formatting

Output ONLY the revised markdown document. No preamble, no explanation.`,

  goldfishSystem: `You are a brand new engineer who just joined a team. You have been handed a design document. You have zero prior context — no meetings, no Slack, no conversations. You are the Goldfish. You are rigorous, literal, and unforgiving of ambiguity. Your only input is this document.

CRITICAL OUTPUT RULE: Return ONLY valid JSON. No markdown. No preamble.`,

  goldfishUser: doc => `You have been handed this design document with absolutely no other context:

<design_doc>
${doc}
</design_doc>

Perform a Goldfish Test. Answer everything from the document alone. If you cannot answer something definitively from the document, it is a FAILURE.

Return ONLY this JSON:
{
  "system_comprehension": "3-4 sentence description of what this system does, who uses it, and why it exists — based ONLY on the doc",
  "can_implement": true | false,
  "verdict": "PASS" | "FAIL",
  "pass_reason": "If PASS: one paragraph explaining why this doc is genuinely implementation-ready",
  "failures": [
    {
      "id": "unique_id",
      "category": "CRITICAL_GAP" | "WEAK_ASSUMPTION" | "MISSING_EDGE_CASE" | "ARCHITECTURE_QUESTION",
      "title": "Short title of the gap",
      "description": "Exact description of what's missing or ambiguous",
      "question": "The specific question that must be answered before this doc passes",
      "severity": "BLOCKER" | "MAJOR"
    }
  ]
}

VERDICT RULES:
- PASS: Zero BLOCKER failures.
- FAIL: One or more BLOCKER failures exist.
If verdict is PASS, failures array must be empty.
If verdict is FAIL, failures array must contain ONLY BLOCKER-level issues.`,
};

// ── Markdown renderer ────────────────────────────────────
function mdToHtml(text) {
  if (!text) return '';
  let h = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h = h.replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/^---+$/gm, '<hr/>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  h = h.replace(/^\s*[-*] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>[^<]*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  h = h.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  const lines = h.split('\n');
  const out = [];
  for (const ln of lines) {
    const t = ln.trim();
    if (!t) { out.push(''); continue; }
    if (/^<(h[123]|ul|li|pre|hr|blockquote)/.test(t)) { out.push(t); }
    else { out.push(`<p>${t}</p>`); }
  }
  return out.join('\n');
}

// ── Elapsed Timer ────────────────────────────────────────
function ElapsedTimer({ running }) {
  const [s, setS] = useState(0);
  const t0 = useRef(null);
  const raf = useRef(null);
  useEffect(() => {
    if (running) {
      t0.current = Date.now();
      const tick = () => { setS(Math.floor((Date.now() - t0.current) / 1000)); raf.current = requestAnimationFrame(tick); };
      raf.current = requestAnimationFrame(tick);
    } else { cancelAnimationFrame(raf.current); setS(0); }
    return () => cancelAnimationFrame(raf.current);
  }, [running]);
  if (!running) return null;
  const m = Math.floor(s / 60), sec = s % 60;
  return React.createElement('span', { className: 'elapsed-timer' }, `${m}:${String(sec).padStart(2,'0')}`);
}

// ── Pipeline Tracker ─────────────────────────────────────
function PipelineTracker({ stage }) {
  const idx = ORDER.indexOf(stage);
  return React.createElement('div', { className: 'header-center' },
    PIPELINE.map((step, i) => {
      const si = ORDER.indexOf(step.id);
      const active = step.id === stage || (stage === S.MAX && step.id === S.COMPLETE);
      const done = si < idx;
      return React.createElement(React.Fragment, { key: step.id },
        React.createElement('div', { className: `pipeline-step ${active ? 'active' : ''} ${done ? 'done' : ''}` },
          React.createElement('div', { className: 'pipeline-node' }),
          step.label,
        ),
        i < PIPELINE.length - 1 && React.createElement('div', { className: `pipeline-line ${done ? 'done' : ''}` }),
      );
    })
  );
}

// ── Issue Card ───────────────────────────────────────────
function IssueCard({ issue, index, onAnswer, onSuggest }) {
  const [local, setLocal] = useState(issue.userAnswer || '');
  const taRef = useRef(null);
  useEffect(() => setLocal(issue.userAnswer || ''), [issue.userAnswer]);

  const onChange = e => { setLocal(e.target.value); onAnswer(issue.id, e.target.value); };
  const onPill = ans => { setLocal(ans); onAnswer(issue.id, ans); taRef.current?.focus(); };

  const cat = CAT[issue.category] || CAT.CRITICAL_GAP;
  const sev = SEV[issue.severity] || SEV.MINOR;
  const answered = local.trim().length > 0;

  return React.createElement('div', {
    className: `issue-card ${cat.cls} ${answered ? 'answered' : ''}`,
    style: { animationDelay: `${Math.min(index, 10) * 40}ms` },
  },
    React.createElement('div', { className: 'issue-header' },
      React.createElement('div', { className: 'issue-badges' },
        React.createElement('span', { className: `badge ${cat.bCls}` }, cat.label),
        React.createElement('span', { className: `badge ${sev.cls}` }, sev.label),
        answered && React.createElement('span', { className: 'badge b-answered' }, '✓ answered'),
      ),
      React.createElement('span', { className: 'issue-num' }, `#${index + 1}`),
    ),
    React.createElement('div', { className: 'issue-title' }, issue.title),
    React.createElement('div', { className: 'issue-desc' }, issue.description),
    React.createElement('div', { className: 'issue-q' }, issue.question),
    React.createElement('textarea', {
      ref: taRef,
      className: 'issue-textarea',
      value: local,
      onChange,
      placeholder: 'Your answer…',
    }),
    React.createElement('div', null,
      React.createElement('button', {
        className: 'btn-suggest',
        onClick: () => onSuggest(issue.id),
        disabled: issue.loadingSuggestions,
      },
        issue.loadingSuggestions
          ? React.createElement(React.Fragment, null, React.createElement('span', { className: 'spinner', style: { width: 10, height: 10 } }), 'Thinking…')
          : '💡 Suggest answers'
      ),
    ),
    issue.suggestions?.length > 0 && React.createElement('div', { className: 'suggestions' },
      issue.suggestions.map((s, i) =>
        React.createElement('button', {
          key: i, className: 'suggestion-pill', onClick: () => onPill(s.answer),
        },
          s.label,
          React.createElement('span', { className: 'pill-tooltip' }, s.answer),
        )
      )
    ),
  );
}

// ── App ──────────────────────────────────────────────────
function App() {
  const [st, setSt] = useState({
    stage: S.INPUT,
    rawDoc: '', currentDoc: '', finalDoc: '',
    iteration: 0, maxIterations: 4,
    summary: '', issues: [],
    goldfishResult: null,
    feed: [],
    error: null, loading: false,
    copyStatus: 'idle',
  });

  const rightRef = useRef(null);

  const log = useCallback((type, text) =>
    setSt(s => ({ ...s, feed: [...s.feed, { type, text, id: Math.random() }] }))
  , []);

  useEffect(() => {
    if (rightRef.current) rightRef.current.scrollTop = rightRef.current.scrollHeight;
  }, [st.feed, st.issues, st.stage]);

  // ── Elephant ──
  const runElephant = useCallback(async (doc, iter) => {
    setSt(s => ({ ...s, stage: S.ELEPHANT, loading: true, error: null }));
    log('elephant', `Elephant analysis started (iteration ${iter + 1})…`);
    try {
      const raw = await callAI(P.elephantSystem, P.elephantUser(doc));
      const parsed = parseJSON(raw);
      const issues = (parsed.issues || []).map(i => ({ ...i, userAnswer: '', suggestions: [], loadingSuggestions: false }));
      log('elephant', `Found ${issues.length} issue(s). ${parsed.summary}`);
      setSt(s => ({ ...s, stage: S.QA, summary: parsed.summary, issues, loading: false, iteration: iter + 1 }));
    } catch (e) {
      setSt(s => ({ ...s, loading: false, error: `Elephant failed: ${e.message}`, stage: S.INPUT }));
    }
  }, [log]);

  const handleForge = useCallback(async () => {
    if (!st.rawDoc.trim()) return;
    setSt(s => ({ ...s, currentDoc: s.rawDoc, feed: [], iteration: 0 }));
    log('system', 'Forge initiated…');
    await runElephant(st.rawDoc, 0);
  }, [st.rawDoc, runElephant, log]);

  // ── Suggest ──
  const handleSuggest = useCallback(async id => {
    const issue = st.issues.find(i => i.id === id);
    if (!issue) return;
    setSt(s => ({ ...s, issues: s.issues.map(i => i.id === id ? { ...i, loadingSuggestions: true } : i) }));
    try {
      const raw = await callAI(P.suggestSystem, P.suggestUser(issue, st.currentDoc.slice(0, 1500)), 1000);
      const parsed = parseJSON(raw);
      setSt(s => ({ ...s, issues: s.issues.map(i => i.id === id ? { ...i, suggestions: parsed.suggestions || [], loadingSuggestions: false } : i) }));
    } catch (e) {
      setSt(s => ({ ...s, issues: s.issues.map(i => i.id === id ? { ...i, loadingSuggestions: false } : i), error: `Suggest failed: ${e.message}` }));
    }
  }, [st.issues, st.currentDoc]);

  const handleAnswer = useCallback((id, val) =>
    setSt(s => ({ ...s, issues: s.issues.map(i => i.id === id ? { ...i, userAnswer: val } : i) }))
  , []);

  // ── Goldfish ──
  const runGoldfish = useCallback(async doc => {
    setSt(s => ({ ...s, stage: S.GOLDFISH, loading: true, error: null }));
    log('goldfish', 'Goldfish test — reading doc with zero prior context…');
    try {
      const raw = await callAI(P.goldfishSystem, P.goldfishUser(doc), 3000);
      const parsed = parseJSON(raw);
      log(parsed.verdict === 'PASS' ? 'pass' : 'fail',
        parsed.verdict === 'PASS'
          ? `PASS — ${parsed.pass_reason}`
          : `FAIL — ${parsed.failures?.length || 0} blocker(s)`
      );
      setSt(s => {
        if (parsed.verdict === 'PASS') {
          return { ...s, goldfishResult: parsed, finalDoc: doc, stage: S.COMPLETE, loading: false };
        } else if (s.iteration >= s.maxIterations) {
          return { ...s, goldfishResult: parsed, finalDoc: doc, stage: S.MAX, loading: false };
        } else {
          const issues = (parsed.failures || []).map(f => ({ ...f, userAnswer: '', suggestions: [], loadingSuggestions: false }));
          return { ...s, goldfishResult: parsed, stage: S.QA, issues, summary: `Goldfish failed — ${parsed.system_comprehension}`, loading: false };
        }
      });
    } catch (e) {
      setSt(s => ({ ...s, loading: false, error: `Goldfish failed: ${e.message}`, stage: S.REVISING }));
    }
  }, [log]);

  // ── Revise ──
  const handleRevise = useCallback(async () => {
    setSt(s => ({ ...s, stage: S.REVISING, loading: true, error: null }));
    log('revision', 'Revising document…');
    const ia = st.issues
      .filter(i => i.userAnswer.trim())
      .map(i => `ISSUE [${i.category}]: ${i.title}\nQUESTION: ${i.question}\nANSWER: ${i.userAnswer.trim()}`)
      .join('\n\n---\n\n');
    try {
      const revised = await callAI(P.revisionSystem, P.revisionUser(st.currentDoc, ia), 6000);
      log('revision', `Revised. Running Goldfish…`);
      setSt(s => ({ ...s, currentDoc: revised, loading: false }));
      await runGoldfish(revised);
    } catch (e) {
      setSt(s => ({ ...s, loading: false, error: `Revision failed: ${e.message}`, stage: S.QA }));
    }
  }, [st.issues, st.currentDoc, runGoldfish, log]);

  const blockers = useMemo(() => st.issues.filter(i => i.severity === 'BLOCKER' && !i.userAnswer.trim()).length, [st.issues]);
  const answered = useMemo(() => st.issues.filter(i => i.userAnswer.trim()).length, [st.issues]);
  const isRunning = [S.ELEPHANT, S.REVISING, S.GOLDFISH].includes(st.stage);

  const handleCopy = useCallback(async () => {
    try { await navigator.clipboard.writeText(st.finalDoc); setSt(s => ({ ...s, copyStatus: 'copied' })); setTimeout(() => setSt(s => ({ ...s, copyStatus: 'idle' })), 2000); } catch {}
  }, [st.finalDoc]);

  const handleReset = useCallback(() =>
    setSt(s => ({ stage: S.INPUT, rawDoc: '', currentDoc: '', finalDoc: '', iteration: 0, maxIterations: 4, summary: '', issues: [], goldfishResult: null, feed: [], error: null, loading: false, copyStatus: 'idle' }))
  , []);

  // ── Header ──
  const header = React.createElement('header', { className: 'header' },
    React.createElement('div', { className: 'header-left' },
      React.createElement('div', { className: 'logo-diamond' }),
      React.createElement('span', { className: 'logo-name' }, 'DesignDoc Forge'),
      React.createElement('span', { className: 'logo-tag' }, 'Elephant-Goldfish'),
    ),
    React.createElement(PipelineTracker, { stage: st.stage }),
    React.createElement('div', { className: 'header-right' },
      st.iteration > 0 && React.createElement('span', { className: 'iter-badge' }, `iter ${st.iteration}/${st.maxIterations}`),
      React.createElement(ElapsedTimer, { running: isRunning }),
    ),
  );

  // ── Input screen ──
  if (st.stage === S.INPUT) {
    const canRun = st.rawDoc.trim().length > 50;
    return React.createElement(React.Fragment, null,
      header,
      React.createElement('main', { className: 'screen-input' },
        React.createElement('div', { className: 'hero' },
          React.createElement('div', { className: 'hero-pill' },
            React.createElement('span', { style: { width: 5, height: 5, background: 'currentColor', display: 'inline-block', borderRadius: '50%' } }),
            'Human-in-the-loop pipeline'
          ),
          React.createElement('h2', null, 'Stress-test your design before you write a line of code.'),
          React.createElement('p', null, 'The Elephant finds every gap. You answer every question. The Goldfish reads the result cold. Loop until it passes.'),
        ),
        React.createElement('div', { className: 'input-box' },
          React.createElement('textarea', {
            value: st.rawDoc,
            onChange: e => setSt(s => ({ ...s, rawDoc: e.target.value })),
            placeholder: 'Paste your design document here — architecture decisions, feature specs, system design, API contracts, anything…',
          }),
          React.createElement('div', { className: 'input-footer' },
            React.createElement('span', { className: 'char-count' }, `${st.rawDoc.length.toLocaleString()} chars`),
            React.createElement('button', { className: 'btn-primary', onClick: handleForge, disabled: !canRun }, 'Run Through The Forge →'),
          ),
        ),
        st.error && React.createElement('div', { className: 'error-banner', style: { maxWidth: 680, width: '100%' } },
          React.createElement('span', null, st.error),
          React.createElement('button', { className: 'error-dismiss', onClick: () => setSt(s => ({ ...s, error: null })) }, '×'),
        ),
      ),
    );
  }

  // ── Complete screen ──
  if (st.stage === S.COMPLETE || st.stage === S.MAX) {
    const isPass = st.stage === S.COMPLETE;
    return React.createElement(React.Fragment, null,
      header,
      React.createElement('main', { className: 'screen-complete' },
        // Left — final doc
        React.createElement('div', { className: 'panel-left' },
          React.createElement('div', { className: 'panel-header' },
            React.createElement('div', { className: 'panel-label' },
              React.createElement('div', { className: 'panel-label-dot', style: { background: isPass ? 'var(--green)' : 'var(--amber)' } }),
              isPass ? 'Final Document — Production Ready' : 'Best Document — Max Iterations Reached',
            ),
            React.createElement('button', { className: `copy-btn ${st.copyStatus === 'copied' ? 'copied' : ''}`, onClick: handleCopy },
              st.copyStatus === 'copied' ? '✓ Copied' : 'Copy Markdown'
            ),
          ),
          React.createElement('div', { className: 'panel-doc' },
            React.createElement('div', { className: 'md-doc', dangerouslySetInnerHTML: { __html: mdToHtml(st.finalDoc) } }),
          ),
        ),
        // Right — result
        React.createElement('div', { className: 'result-sidebar' },
          React.createElement('div', { className: `pass-card ${isPass ? 'pass-state' : 'warn-state'}` },
            React.createElement('div', { className: `pass-title ${isPass ? 'pass-state' : 'warn-state'}` }, isPass ? '✓ PASS' : '⚠ MAX'),
            React.createElement('div', { className: 'pass-sub' },
              isPass
                ? `Passed in ${st.iteration} iteration${st.iteration !== 1 ? 's' : ''}.`
                : `Reached ${st.maxIterations} iterations without a full Goldfish pass.`
            ),
            isPass && st.goldfishResult?.pass_reason &&
              React.createElement('div', { className: 'pass-reason' }, st.goldfishResult.pass_reason),
          ),
          st.goldfishResult?.system_comprehension && React.createElement('div', { className: 'comprehension-card' },
            React.createElement('div', { className: 'section-label' }, '🐟 Goldfish Comprehension'),
            React.createElement('div', { style: { fontSize: 12, color: 'var(--text-2)', lineHeight: 1.65 } }, st.goldfishResult.system_comprehension),
          ),
          st.feed.length > 0 && React.createElement('div', null,
            React.createElement('div', { className: 'section-label', style: { marginBottom: 6 } }, 'Pipeline Log'),
            ...st.feed.map(e => React.createElement('div', { key: e.id, className: 'activity-entry' },
              React.createElement('span', { className: 'activity-icon' }, e.type === 'elephant' ? '🐘' : e.type === 'goldfish' ? '🐟' : e.type === 'revision' ? '✏️' : e.type === 'pass' ? '✅' : e.type === 'fail' ? '❌' : '·'),
              React.createElement('span', null, e.text),
            ))
          ),
          React.createElement('button', { className: 'btn-ghost', onClick: handleReset, style: { alignSelf: 'flex-start' } }, '← Forge Another Doc'),
        ),
      ),
    );
  }

  // ── Work screen ──
  const isQA = st.stage === S.QA;

  return React.createElement(React.Fragment, null,
    header,
    React.createElement('main', { className: 'screen-work' },

      // Left panel — live doc
      React.createElement('div', { className: 'panel-left' },
        React.createElement('div', { className: 'panel-header' },
          React.createElement('div', { className: 'panel-label' },
            React.createElement('div', { className: 'panel-label-dot' }),
            'Live Document',
          ),
        ),
        st.currentDoc
          ? React.createElement('div', { className: 'panel-doc' },
              React.createElement('div', { className: 'md-doc', dangerouslySetInnerHTML: { __html: mdToHtml(st.currentDoc) } }),
            )
          : React.createElement('div', { className: 'empty-doc' }, 'Document will appear here after first revision'),
      ),

      // Right panel — Q&A / activity
      React.createElement('div', { className: 'panel-right', ref: rightRef },

        // Error
        st.error && React.createElement('div', { className: 'error-banner' },
          React.createElement('span', null, st.error),
          React.createElement('button', { className: 'error-dismiss', onClick: () => setSt(s => ({ ...s, error: null })) }, '×'),
        ),

        // Loading card
        isRunning && React.createElement('div', { className: 'loading-card' },
          React.createElement('div', { className: 'spinner' }),
          React.createElement('span', { className: 'loading-text' },
            st.stage === S.ELEPHANT ? '🐘 Elephant analyzing…' :
            st.stage === S.REVISING ? '✏️ Revising document…' :
            '🐟 Goldfish testing…'
          ),
          React.createElement(ElapsedTimer, { running: isRunning }),
        ),

        // Summary
        st.summary && React.createElement('div', { className: 'summary-card' },
          React.createElement('div', { className: 'summary-label' }, st.iteration > 1 ? '🐟 Goldfish Verdict' : '🐘 Elephant Assessment'),
          React.createElement('div', { className: 'summary-text' }, st.summary),
        ),

        // Q&A
        isQA && st.issues.length > 0 && React.createElement(React.Fragment, null,
          React.createElement('div', { className: 'issues-meta' },
            React.createElement('span', null, `${st.issues.length} issue${st.issues.length !== 1 ? 's' : ''} · ${answered} answered`),
            blockers > 0 && React.createElement('span', { className: 'blocker-warn' }, `${blockers} blocker${blockers !== 1 ? 's' : ''} required`),
          ),
          ...st.issues.map((issue, i) =>
            React.createElement(IssueCard, { key: issue.id, issue, index: i, onAnswer: handleAnswer, onSuggest: handleSuggest })
          ),
          React.createElement('div', { className: 'revise-bar' },
            React.createElement('button', {
              className: 'revise-btn',
              onClick: handleRevise,
              disabled: blockers > 0,
            },
              blockers > 0
                ? `Answer ${blockers} blocker${blockers !== 1 ? 's' : ''} to continue`
                : `Revise with ${answered} answer${answered !== 1 ? 's' : ''} →`
            ),
            blockers === 0 && answered < st.issues.length &&
              React.createElement('div', { className: 'revise-hint' },
                `${st.issues.length - answered} non-blocker${st.issues.length - answered !== 1 ? 's' : ''} left blank will become open questions`
              ),
          ),
        ),

        // Activity (non-QA)
        !isQA && st.feed.length > 0 && React.createElement('div', null,
          React.createElement('div', { className: 'section-label', style: { marginBottom: 6 } }, 'Activity'),
          ...st.feed.map(e => React.createElement('div', { key: e.id, className: 'activity-entry' },
            React.createElement('span', { className: 'activity-icon' }, e.type === 'elephant' ? '🐘' : e.type === 'goldfish' ? '🐟' : e.type === 'revision' ? '✏️' : e.type === 'pass' ? '✅' : e.type === 'fail' ? '❌' : '·'),
            React.createElement('span', null, e.text),
          ))
        ),
      ),
    ),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
